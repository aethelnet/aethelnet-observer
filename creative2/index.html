    <style>

    <script type="module">
        // ========================================================================
        // IMPORTS AND INITIALIZATION
        // ========================================================================
        import * as ThreeJS from 'three';
        
        // Global state
        let scene, camera, renderer, controls;
        let nodes = new Map();  // symbol -> { mesh, data, connections }
        let connections = [];   // Array of connection lines
        let selectedNode = null;
        let correlationThreshold = 30;
        let chartVisible = false;
        let priceChart = null;
        
        // API base URL
        const API_BASE = 'http://localhost:8000/api';
        
        // ========================================================================
        // LOGGING
        // ========================================================================
        function log(message, data = {}) {
            const timestamp = new Date().toISOString();
            console.log(`[Creative2] [${timestamp}] ${message}`, data);
        }
        
        function logError(message, error = null) {
            const timestamp = new Date().toISOString();
            console.error(`[ERROR] [Creative2] [${timestamp}] ${message}`, error || '');
        }
        
        // ========================================================================
        // BACKEND CONNECTION
        // ========================================================================
        async function checkBackend() {
            try {
                const response = await fetch(`${API_BASE}/dashboard/metrics`);
                const statusEl = document.getElementById('status');
                if (response.ok) {
                    statusEl.textContent = 'Connected';
                    statusEl.className = 'status-badge connected';
                    return true;
                } else {
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'status-badge disconnected';
                    return false;
                }
            } catch (error) {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status-badge disconnected';
                return false;
            }
        }
        
        // ========================================================================
        // THREE.JS INITIALIZATION
        // ========================================================================
        async function initThreeJS() {
            const { Scene, PerspectiveCamera, WebGLRenderer, Color, AmbientLight, 
                    DirectionalLight, PointLight, Group, Vector2 } = ThreeJS;
            
            // Scene
            scene = new Scene();
            scene.background = new Color(0x000000);
            
            // Camera
            camera = new PerspectiveCamera(
                75,                                    // Field of view
                window.innerWidth / window.innerHeight, // Aspect ratio
                0.1,                                   // Near clipping plane
                10000                                  // Far clipping plane
            );
            camera.position.set(0, 30, 60);
            
            // Renderer
            const canvas = document.getElementById('canvas');
            renderer = new WebGLRenderer({ canvas, antialias: true });
            const sidebarWidth = parseInt(getComputedStyle(document.getElementById('sidebar')).width) || 350;
            renderer.setSize(window.innerWidth - sidebarWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Manual mouse controls (simpler than OrbitControls, no external dependency)
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let cameraDistance = 60;
            let cameraAngleX = 0.5; // Vertical angle
            let cameraAngleY = 0;   // Horizontal angle
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    cameraAngleY -= deltaX * 0.01;
                    cameraAngleX += deltaY * 0.01;
                    cameraAngleX = Math.max(0.1, Math.min(Math.PI - 0.1, cameraAngleX));
                    
                    camera.position.x = cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
                    camera.position.y = cameraDistance * Math.cos(cameraAngleX);
                    camera.position.z = cameraDistance * Math.sin(cameraAngleX) * Math.sin(cameraAngleY);
                    camera.lookAt(0, 0, 0);
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });
            
            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY * 0.01;
                cameraDistance = Math.max(20, Math.min(200, cameraDistance * (1 + delta)));
                camera.position.x = cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
                camera.position.y = cameraDistance * Math.cos(cameraAngleX);
                camera.position.z = cameraDistance * Math.sin(cameraAngleX) * Math.sin(cameraAngleY);
                camera.lookAt(0, 0, 0);
            });
            
            controls = { update: () => {} }; // Placeholder for compatibility
            
            // Lighting
            const ambientLight = new AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);
            
            const directionalLight = new DirectionalLight(0xffffff, 2.5);
            directionalLight.position.set(50, 50, 50);
            scene.add(directionalLight);
            
            const directionalLight2 = new DirectionalLight(0xffffff, 2.0);
            directionalLight2.position.set(-50, -50, -50);
            scene.add(directionalLight2);
            
            const pointLight = new PointLight(0xffffff, 2.0, 500);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            
            log('✅ Three.js initialized');
        }
        
        // ========================================================================
        // FETCH MARKET DATA
        // ========================================================================
        async function fetchMarketData() {
            try {
                const response = await fetch(`${API_BASE}/dashboard/market-data`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log('Market data received', { count: data.length });
                return data;
            } catch (error) {
                logError('Failed to fetch market data', error);
                return [];
            }
        }
        
        // ========================================================================
        // CALCULATE CORRELATION
        // ========================================================================
        function calculateCorrelation(data1, data2) {
            // Price movement similarity (50% weight)
            const priceChange1 = Math.abs(data1.change_24h || 0);
            const priceChange2 = Math.abs(data2.change_24h || 0);
            const priceDiff = Math.abs(priceChange1 - priceChange2);
            const priceSimilarity = Math.max(0, 1 - priceDiff / 50); // Normalize: 0-50% diff = 0-1 similarity
            
            // Signal alignment (30% weight) - Use signal (number), not signal_strength (string)
            const signal1 = data1.signal || 0; // signal is a number (Z-score, typically -3 to +3)
            const signal2 = data2.signal || 0;
            // If both signals are same direction (both positive or both negative), they're similar
            const sameDirection = (signal1 >= 0 && signal2 >= 0) || (signal1 < 0 && signal2 < 0);
            const signalDiff = Math.abs(signal1 - signal2);
            // Higher similarity if same direction and close values
            const signalSimilarity = sameDirection ? Math.max(0, 1 - signalDiff / 6) : Math.max(0, 0.5 - signalDiff / 6);
            
            // Volume similarity (20% weight)
            const vol1 = Math.log10((data1.volume || 0) + 1);
            const vol2 = Math.log10((data2.volume || 0) + 1);
            const volDiff = Math.abs(vol1 - vol2);
            const volSimilarity = Math.max(0, 1 - volDiff / 5); // Normalize log volume difference
            
            const correlation = (priceSimilarity * 0.5 + signalSimilarity * 0.3 + volSimilarity * 0.2) * 100;
            return Math.max(0, Math.min(100, correlation));
        }
        
        // ========================================================================
        // CREATE NODE
        // ========================================================================
        function createNode(symbol, data, index, total) {
            const { SphereGeometry, MeshStandardMaterial, Mesh, Group } = ThreeJS;
            
            // Calculate position (spiral distribution)
            const radius = 20 + (index * 4);
            const theta = (index / total) * Math.PI * 2;
            const phi = Math.acos((index * 2.0) / total - 1.0);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            // Size based on volume
            const volume = data.volume || 0;
            const size = Math.max(5, Math.min(12, Math.log10(volume + 1) / 2 + 4));
            
            // Color based on signal_strength (string), not signal (number)
            const signalStr = data.signal_strength || '';
            let color = '#888888'; // Gray (neutral)
            if (signalStr.includes('BUY')) {
                color = '#4ade80'; // Green
            } else if (signalStr.includes('SELL')) {
                color = '#f87171'; // Red
            }
            
            // Create sphere
            const geometry = new SphereGeometry(size, 32, 32);
            const material = new MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 1.0,
                metalness: 0.1,
                roughness: 0.2
            });
            
            const planet = new Mesh(geometry, material);
            planet.position.set(x, y, z);
            planet.userData.symbol = symbol;
            planet.userData.isNode = true;
            
            // Group
            const group = new Group();
            group.add(planet);
            
            // Store node data
            nodes.set(symbol, {
                mesh: planet,
                group: group,
                data: data,
                position: { x, y, z },
                material: material,
                baseSize: size
            });
            
            scene.add(group);
            log(`✅ Node ${symbol} created`, { 
                position: `(${x.toFixed(1)}, ${y.toFixed(1)}, ${z.toFixed(1)})`, 
                size: size.toFixed(2),
                color: color,
                signal: data.signal_strength || 'N/A',
                volume: data.volume?.toFixed(2) || '0',
                signalValue: data.signal?.toFixed(2) || '0'
            });
        }
        
        // ========================================================================
        // CREATE CONNECTIONS
        // ========================================================================
        function createConnections() {
            // Clear existing connections
            connections.forEach(conn => scene.remove(conn));
            connections = [];
            
            const nodeArray = Array.from(nodes.entries());
            
            for (let i = 0; i < nodeArray.length; i++) {
                for (let j = i + 1; j < nodeArray.length; j++) {
                    const [symbol1, node1] = nodeArray[i];
                    const [symbol2, node2] = nodeArray[j];
                    
                    const correlation = calculateCorrelation(node1.data, node2.data);
                    
                    // Debug: Log first few correlations
                    if (i === 0 && j === 1) {
                        log(`Sample correlation: ${symbol1} ↔ ${symbol2} = ${correlation.toFixed(1)}%`, {
                            price1: node1.data.change_24h,
                            price2: node2.data.change_24h,
                            signal1: node1.data.signal,
                            signal2: node2.data.signal,
                            vol1: node1.data.volume,
                            vol2: node2.data.volume
                        });
                    }
                    
                    if (correlation >= correlationThreshold) {
                        const { BufferGeometry, Float32BufferAttribute, LineBasicMaterial, Line } = ThreeJS;
                        
                        const geometry = new BufferGeometry();
                        const positions = new Float32Array([
                            node1.position.x, node1.position.y, node1.position.z,
                            node2.position.x, node2.position.y, node2.position.z
                        ]);
                        geometry.setAttribute('position', new Float32BufferAttribute(positions, 3));
                        
                        // Color based on correlation strength
                        let lineColor = '#888888'; // Gray (weak)
                        if (correlation >= 70) {
                            lineColor = '#4ade80'; // Green (strong)
                        } else if (correlation >= 50) {
                            lineColor = '#fbbf24'; // Yellow (medium)
                        }
                        
                        const material = new LineBasicMaterial({ 
                            color: lineColor,
                            opacity: 0.6,
                            transparent: true
                        });
                        
                        const line = new Line(geometry, material);
                        line.userData.correlation = correlation;
                        line.userData.node1 = symbol1;
                        line.userData.node2 = symbol2;
                        
                        scene.add(line);
                        connections.push(line);
                    }
                }
            }
            
            log(`✅ Created ${connections.length} connections`);
        }
        
        // ========================================================================
        // UPDATE NODE LIST
        // ========================================================================
        function updateNodeList() {
            const listEl = document.getElementById('node-list');
            listEl.innerHTML = '';
            
            nodes.forEach((node, symbol) => {
                const item = document.createElement('div');
                item.className = 'node-item';
                item.dataset.symbol = symbol;
                
                // signal_strength is the string (e.g., "STRONG BUY"), signal is a number
                const signalStr = node.data.signal_strength || '';
                const signalClass = signalStr.includes('BUY') ? 'buy' : 
                                   signalStr.includes('SELL') ? 'sell' : '';
                
                item.innerHTML = `
                    <div class="node-symbol">${symbol}</div>
                    <div class="node-price">$${node.data.price?.toFixed(2) || 'N/A'}</div>
                    <div class="node-signal ${signalClass}">${node.data.signal_strength || 'NEUTRAL'}</div>
                `;
                
                item.addEventListener('click', () => selectNode(symbol));
                listEl.appendChild(item);
            });
        }
        
        // ========================================================================
        // SELECT NODE
        // ========================================================================
        function selectNode(symbol) {
            // Deselect previous
            if (selectedNode) {
                const prevNode = nodes.get(selectedNode);
                if (prevNode) {
                    prevNode.material.emissiveIntensity = 1.0;
                }
            }
            
            selectedNode = symbol;
            const node = nodes.get(symbol);
            
            if (node) {
                // Highlight selected
                node.material.emissiveIntensity = 2.0;
                
                // Update UI
                document.querySelectorAll('.node-item').forEach(item => {
                    item.classList.toggle('selected', item.dataset.symbol === symbol);
                });
                
                // Show node info
                const infoEl = document.getElementById('node-info');
                const detailsEl = document.getElementById('node-details');
                infoEl.style.display = 'block';
                detailsEl.innerHTML = `
                    <div><strong>Symbol:</strong> ${symbol}</div>
                    <div><strong>Price:</strong> $${node.data.price?.toFixed(2) || 'N/A'}</div>
                    <div><strong>Signal:</strong> ${node.data.signal_strength || 'NEUTRAL'}</div>
                    <div><strong>Signal Value:</strong> ${node.data.signal?.toFixed(2) || 'N/A'}</div>
                    <div><strong>Volume:</strong> ${node.data.volume?.toFixed(2) || 'N/A'}</div>
                    <div><strong>24h Change:</strong> ${node.data.change_24h?.toFixed(2) || 'N/A'}%</div>
                    <div style="margin-top: 10px;"><strong>Connections:</strong> ${connections.filter(c => c.userData.node1 === symbol || c.userData.node2 === symbol).length}</div>
                `;
                
                // Show price chart
                showPriceChart(symbol, node.data);
            }
        }
        
        // ========================================================================
        // PRICE CHART (Chart.js)
        // ========================================================================
        function showPriceChart(symbol, data) {
            const overlay = document.getElementById('chart-overlay');
            const chartTitle = document.getElementById('chart-title');
            chartTitle.textContent = `${symbol} Price History`;
            
            // For now, show current price as a simple chart
            // In a real implementation, you'd fetch historical data
            const ctx = document.getElementById('price-chart').getContext('2d');
            
            if (priceChart) {
                priceChart.destroy();
            }
            
            // Simulate price history (in real app, fetch from API)
            const labels = Array.from({ length: 20 }, (_, i) => `T-${20-i}`);
            const prices = Array.from({ length: 20 }, () => data.price + (Math.random() - 0.5) * data.price * 0.1);
            
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Price',
                        data: prices,
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
            
            overlay.classList.add('show');
            chartVisible = true;
        }
        
        // ========================================================================
        // ANIMATION LOOP
        // ========================================================================
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls) {
                controls.update();
            }
            
            // Animate nodes (pulsing effect)
            const time = Date.now() * 0.001;
            nodes.forEach((node, symbol) => {
                if (node.mesh) {
                    const pulse = 1 + Math.sin(time * 2 + symbol.charCodeAt(0)) * 0.1;
                    node.mesh.scale.setScalar(node.baseSize * pulse);
                }
            });
            
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // ========================================================================
        // EVENT HANDLERS
        // ========================================================================
        document.getElementById('correlation-slider').addEventListener('input', (e) => {
            correlationThreshold = parseInt(e.target.value);
            document.getElementById('correlation-value').textContent = `${correlationThreshold}%`;
            createConnections();
        });
        
        // Setup help system
        if (window.helpSystem) {
            // Add tooltips to buttons
            document.querySelectorAll('[data-help]').forEach(btn => {
                window.helpSystem.addTooltip(btn, btn.dataset.help);
            });
            
            // Setup help button
            const helpBtn = document.getElementById('help-btn');
            if (helpBtn) {
                helpBtn.addEventListener('click', () => {
                    window.helpSystem.showHelpModal(`
                        <h3 style="color: #4ade80; margin-bottom: 15px;">Market Connections v2 Help</h3>
                        <div style="line-height: 1.8;">
                            <h4 style="color: #4ade80; margin-top: 20px; margin-bottom: 10px;">Controls</h4>
                            <ul style="margin-left: 20px; margin-top: 10px;">
                                <li><strong>Chart:</strong> Toggle price history chart overlay for selected market</li>
                                <li><strong>Reset:</strong> Return 3D camera to default position</li>
                                <li><strong>Labels:</strong> Show/hide market name labels on nodes</li>
                                <li><strong>Debug:</strong> Show/hide technical debug information panel</li>
                            </ul>
                            
                            <h4 style="color: #4ade80; margin-top: 20px; margin-bottom: 10px;">Interaction</h4>
                            <ul style="margin-left: 20px; margin-top: 10px;">
                                <li><strong>Click node:</strong> Select a market to see its price chart</li>
                                <li><strong>Drag:</strong> Rotate the 3D view</li>
                                <li><strong>Scroll:</strong> Zoom in/out</li>
                                <li><strong>Click market in list:</strong> Select and focus on that market</li>
                            </ul>
                            
                            <h4 style="color: #4ade80; margin-top: 20px; margin-bottom: 10px;">About This View</h4>
                            <p>This enhanced visualization shows market connections with interactive price charts. Select any market node to see its detailed price history.</p>
                        </div>
                    `);
                });
            }
        }
        
        document.getElementById('toggle-chart').addEventListener('click', () => {
            const overlay = document.getElementById('chart-overlay');
            chartVisible = !chartVisible;
            if (chartVisible && selectedNode) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
            }
        });
        
        document.getElementById('close-chart').addEventListener('click', () => {
            document.getElementById('chart-overlay').classList.remove('show');
            chartVisible = false;
        });
        
        document.getElementById('reset-view').addEventListener('click', () => {
            if (camera) {
                camera.position.set(0, 30, 60);
                camera.lookAt(0, 0, 0);
                updateDebugInfo();
            }
        });
        
        // Debug panel toggle
        let debugVisible = false;
        document.getElementById('toggle-debug').addEventListener('click', () => {
            debugVisible = !debugVisible;
            document.getElementById('debug-panel').style.display = debugVisible ? 'block' : 'none';
            if (debugVisible) {
                updateDebugInfo();
                // Update debug info every second
                const debugInterval = setInterval(() => {
                    if (debugVisible) {
                        updateDebugInfo();
                    } else {
                        clearInterval(debugInterval);
                    }
                }, 1000);
            }
        });
        
        document.getElementById('close-debug').addEventListener('click', () => {
            debugVisible = false;
            document.getElementById('debug-panel').style.display = 'none';
        });
        
        // Debug info update function
        function updateDebugInfo() {
            if (!debugVisible) return;
            
            // Scene info
            document.getElementById('debug-scene').textContent = 
                scene ? `✅ ${scene.children.length} objects` : '❌ Not initialized';
            
            // Camera info
            if (camera) {
                const pos = camera.position;
                document.getElementById('debug-camera').textContent = 
                    `(${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`;
            } else {
                document.getElementById('debug-camera').textContent = '❌ Not initialized';
            }
            
            // Nodes info
            document.getElementById('debug-nodes').textContent = 
                `${nodes.size} nodes in map`;
            
            // Connections info
            document.getElementById('debug-connections').textContent = 
                `${connections.length} connections (threshold: ${correlationThreshold}%)`;
            
            // Renderer info
            if (renderer) {
                const size = renderer.getSize(new (ThreeJS.Vector2 || Vector2)());
                document.getElementById('debug-renderer').textContent = 
                    `✅ ${size.width}x${size.height}`;
            } else {
                document.getElementById('debug-renderer').textContent = '❌ Not initialized';
            }
            
            // Threshold
            document.getElementById('debug-threshold').textContent = `${correlationThreshold}%`;
            
            // Node positions
            const positionsHtml = Array.from(nodes.entries())
                .map(([symbol, node]) => {
                    const pos = node.position;
                    return `${symbol}: (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`;
                })
                .join('<br>');
            document.getElementById('debug-node-positions').innerHTML = 
                positionsHtml || 'No nodes';
        }
        
        // Click handler for nodes (will be added after renderer is initialized)
        // For now, use sidebar list for node selection
        
        // ========================================================================
        // INITIALIZATION
        // ========================================================================
        async function init() {
            log('🚀 Market Connections v2 - Initializing...');
            
            // Check backend
            await checkBackend();
            setInterval(checkBackend, 5000);
            
            // Initialize Three.js
            await initThreeJS();
            
            // Fetch and create nodes
            const marketData = await fetchMarketData();
            marketData.forEach((data, index) => {
                createNode(data.symbol, data, index, marketData.length);
            });
            
            // Create connections
            createConnections();
            
            // Update UI
            updateNodeList();
            
            // Initial debug info
            setTimeout(() => {
                if (debugVisible) updateDebugInfo();
            }, 500);
            
            // Start animation
            animate();
            
            // Handle window resize (responsive to sidebar width changes)
            window.addEventListener('resize', () => {
                if (camera && renderer) {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarWidth = sidebar ? parseInt(getComputedStyle(sidebar).width) : 350;
                    const canvasWidth = window.innerWidth - sidebarWidth;
                    const canvasHeight = window.innerHeight;
                    
                    camera.aspect = canvasWidth / canvasHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(canvasWidth, canvasHeight);
                }
            });
            
            log('✅ Market Connections v2 initialized');
        }
        
        // Start initialization
        init().catch(error => {
            logError('Initialization failed', error);
        });
    </script>
</body>
</html>
