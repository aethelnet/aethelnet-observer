<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Trading Chart View - Port 1423</title>
    
    <!-- Shared Design System -->
    <link rel="stylesheet" href="shared.css">
    <script src="navigation.js"></script>
    <!-- Lightweight Charts - Professional Trading Chart Library -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- html2canvas for chart export -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <!-- Control Slider Component -->
    <script src="ControlSlider.js"></script>
    <!-- Help System -->
    <script src="../help-system.js"></script>
    <script src="../ws-client.js" defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Monaco', monospace;
            background: #000;
            color: #fff;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        
        /* Top Toolbar */
        #toolbar {
            background: rgba(20, 20, 30, 0.95);
            border-bottom: 1px solid rgba(74, 222, 128, 0.2);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }
        
        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toolbar-section.separator {
            border-left: 1px solid rgba(74, 222, 128, 0.2);
            padding-left: 20px;
        }
        
        .symbol-selector {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ade80;
            background: transparent;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .timeframe-btn {
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .timeframe-btn:hover {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }
        
        .timeframe-btn.active {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.5);
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .status-badge.connected {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.4);
        }
        
        .status-badge.disconnected {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.4);
        }
        
        /* Chart Container */
        #chart-container {
            flex: 1 1 auto;
            position: relative;
            background: #000;
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #chart {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
        }
        
        /* Chart Toolbar */
        .chart-toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 6px;
            padding: 8px;
            backdrop-filter: blur(10px);
        }
        
        .chart-toolbar-btn {
            padding: 6px 12px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #4ade80;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .chart-toolbar-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.5);
        }
        
        .chart-toolbar-btn.active {
            background: rgba(74, 222, 128, 0.3);
            border-color: rgba(74, 222, 128, 0.6);
        }
        
        .chart-toolbar-separator {
            width: 1px;
            background: rgba(74, 222, 128, 0.2);
            margin: 0 4px;
        }
        
        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .zoom-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        /* Crosshair Info Panel */
        .crosshair-info {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 11px;
            font-family: monospace;
            color: #4ade80;
            display: none;
            pointer-events: none;
        }
        
        .crosshair-info.visible {
            display: block;
        }
        
        .crosshair-info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 4px;
        }
        
        .crosshair-info-label {
            color: #888;
        }
        
        .crosshair-info-value {
            color: #4ade80;
            font-weight: bold;
        }
        
        /* Info Panel (Bottom Right) */
        #info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 6px;
            padding: 12px;
            min-width: 200px;
            z-index: 50;
            font-size: 0.85rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .info-label {
            color: #aaa;
        }
        
        .info-value {
            color: #fff;
            font-weight: bold;
        }
        
        .info-value.positive {
            color: #4ade80;
        }
        
        .info-value.negative {
            color: #f87171;
        }
        
        /* Control Deck Styles */
        #control-deck {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 100px);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        @media (max-width: 768px) {
            #control-deck {
                width: 280px;
                right: 10px;
                top: 50px;
            }
            
            .chart-toolbar {
                flex-wrap: wrap;
                max-width: calc(100% - 20px);
            }
            
            .chart-toolbar-btn {
                font-size: 10px;
                padding: 4px 8px;
            }
            
            .crosshair-info {
                font-size: 10px;
                padding: 6px 10px;
            }
        }
        
        /* Responsive chart container */
        @media (max-width: 1024px) {
            #chart-container {
                min-height: 400px;
            }
        }
        
        /* Fullscreen styles */
        #chart-container:fullscreen {
            background: #000;
        }
        
        #chart-container:-webkit-full-screen {
            background: #000;
        }
        
        #chart-container:-moz-full-screen {
            background: #000;
        }
        
        #chart-container:-ms-fullscreen {
            background: #000;
        }
        
        .control-deck-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .control-deck-title {
            font-size: 12px;
            color: #00ff9d;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .control-deck-toggle {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-family: monospace;
        }
        
        .control-deck-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .control-deck-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Custom scrollbar for control deck */
        .control-deck-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .control-deck-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        .control-deck-content::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 157, 0.3);
            border-radius: 3px;
        }
        
        .control-deck-content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 157, 0.5);
        }
        
        .control-deck-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .control-deck-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-family: monospace;
            color: #00ff9d;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        
        .control-deck-section-header:hover {
            color: #4ade80;
        }
        
        .control-deck-section-content {
            padding-left: 16px;
            border-left: 2px solid rgba(0, 255, 157, 0.2);
            margin-left: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .control-deck-section-content.hidden {
            display: none;
        }
        
        .control-deck-layer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .control-deck-layer-btn.active.trades {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        
        .control-deck-layer-btn.active.signals {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }
        
        .control-deck-layer-btn.active.predictions {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }
        
        .control-deck-layer-btn.active.prophecy {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }
        
        .control-deck-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .control-deck-metric-label {
            font-size: 10px;
            font-family: monospace;
            color: #666;
            text-transform: uppercase;
        }
        
        .control-deck-metric-value {
            font-size: 11px;
            font-family: monospace;
            font-weight: bold;
            color: #00ff9d;
        }
        
        .control-deck-metric-value.positive {
            color: #4ade80;
        }
        
        .control-deck-metric-value.negative {
            color: #f87171;
        }
        
        .control-deck-physics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .control-deck-physics-item {
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .control-deck-physics-label {
            font-size: 9px;
            font-family: monospace;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .control-deck-physics-value {
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            color: #00ff9d;
        }
        
        .control-deck-layer-btn {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: transparent;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .control-deck-layer-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
        }
        
        .control-deck-layer-btn.active {
            background: rgba(0, 255, 157, 0.1);
            border-color: rgba(0, 255, 157, 0.3);
            color: #00ff9d;
        }
        
        .control-deck-layer-btn.active.hist {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }
        
        .control-deck-layer-btn.active.live {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
            color: #f87171;
        }
        
        .control-deck-layer-btn.active.vol {
            background: rgba(156, 163, 175, 0.1);
            border-color: rgba(156, 163, 175, 0.3);
            color: #9ca3af;
        }
        
        .control-deck-layer-btn.active.sim {
            background: rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.3);
            color: #06b6d4;
        }
        
        .control-deck-layer-btn.active.ghost {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        
        .control-deck-layer-btn.active.liquid {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        
        /* Control Slider Styles */
        .control-slider {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .control-slider-label-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 4px;
        }
        
        .control-slider-label {
            font-size: 9px;
            font-family: monospace;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .control-slider-value {
            font-size: 11px;
            font-family: monospace;
            font-weight: bold;
            color: #00ff9d;
        }
        
        .control-slider-unit {
            font-size: 9px;
            color: #666;
            margin-left: 2px;
        }
        
        .control-slider-track {
            position: relative;
            height: 24px;
            width: 100%;
            cursor: pointer;
        }
        
        .control-slider-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        
        .control-slider-handle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 16px;
            background: #1f2937;
            border: 1px solid #00ff9d;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
            transition: all 0.075s ease-out;
            cursor: pointer;
        }
        
        .control-slider-handle:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .control-slider-handle:active {
            transform: translate(-50%, -50%) scale(0.95);
            background: #00ff9d;
        }
        
        .control-slider-handle-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #00ff9d;
            border-radius: 50%;
        }
        
        .control-slider-handle:active .control-slider-handle-dot {
            background: #fff;
        }
        
        .chevron {
            width: 12px;
            height: 12px;
            transition: transform 0.2s;
        }
        
        .chevron.down {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Control Deck -->
        <div id="control-deck">
            <div class="control-deck-header">
                <div class="control-deck-title">CONTROL DECK</div>
                <button class="control-deck-toggle" id="control-deck-toggle" 
                        aria-label="Hide or show Control Deck panel"
                        title="Toggle Control Deck visibility">HIDE</button>
                <button class="control-deck-help-btn" id="control-deck-help-btn" 
                        aria-label="Show Control Deck help"
                        title="Show help for Control Deck (F1 or ?)"
                        style="
                            background: rgba(74, 222, 128, 0.2);
                            border: 1px solid rgba(74, 222, 128, 0.4);
                            color: #4ade80;
                            padding: 4px 8px;
                            border-radius: 4px;
                            cursor: help;
                            font-size: 12px;
                            margin-left: 8px;
                        ">?</button>
            </div>
            <div class="control-deck-content" id="control-deck-content">
                <!-- Sections will be populated by JavaScript -->
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="nav" style="position: fixed; top: 10px; right: 10px; z-index: 10000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid rgba(74, 222, 128, 0.3); pointer-events: auto;">
            <a href="http://localhost:1420/index.html" target="_blank" style="margin-right: 10px; pointer-events: auto; position: relative; z-index: 10001;">Dashboard</a>
            <a href="http://localhost:1429/scanner/index.html" target="_blank" style="margin-right: 10px; pointer-events: auto; position: relative; z-index: 10001;">Scanner</a>
            <a href="http://localhost:1427/opportunities/index.html" target="_blank" style="margin-right: 10px; pointer-events: auto; position: relative; z-index: 10001;">Opportunities</a>
            <a href="http://localhost:1428/prophecy/index.html" target="_blank" style="margin-right: 10px; pointer-events: auto; position: relative; z-index: 10001;">PROPHECY</a>
            <a href="http://localhost:1424/analytics/index.html" target="_blank" style="pointer-events: auto; position: relative; z-index: 10001;">Analytics</a>
        </div>
        
        <!-- Toolbar -->
        <div id="toolbar">
            <div class="toolbar-section">
                <select id="symbol-selector" class="symbol-selector"
                        aria-label="Select trading pair symbol"
                        title="Choose which trading pair to display on the chart">
                    <!-- Populated dynamically from backend -->
                    <option value="BTCUSDT">BTCUSDT</option>
                    <option value="ETHUSDT">ETHUSDT</option>
                    <option value="SOLUSDT">SOLUSDT</option>
                    <option value="BNBUSDT">BNBUSDT</option>
                    <option value="XRPUSDT">XRPUSDT</option>
                    <option value="DOGEUSDT">DOGEUSDT</option>
                </select>
            </div>
            
            <div class="toolbar-section separator">
                <button class="timeframe-btn active" data-timeframe="1m" 
                        aria-label="1 minute timeframe"
                        title="Switch to 1 minute candlesticks">1M</button>
                <button class="timeframe-btn" data-timeframe="5m" 
                        aria-label="5 minute timeframe"
                        title="Switch to 5 minute candlesticks">5M</button>
                <button class="timeframe-btn" data-timeframe="15m" 
                        aria-label="15 minute timeframe"
                        title="Switch to 15 minute candlesticks">15M</button>
                <button class="timeframe-btn" data-timeframe="1h" 
                        aria-label="1 hour timeframe"
                        title="Switch to 1 hour candlesticks">1H</button>
                <button class="timeframe-btn" data-timeframe="4h" 
                        aria-label="4 hour timeframe"
                        title="Switch to 4 hour candlesticks">4H</button>
                <button class="timeframe-btn" data-timeframe="1d" 
                        aria-label="1 day timeframe"
                        title="Switch to 1 day candlesticks">1D</button>
            </div>
            
            <div class="toolbar-section separator">
                <div id="status" class="status-badge disconnected">Disconnected</div>
            </div>
        </div>
        
        <!-- Chart Container -->
        <div id="chart-container">
            <!-- Chart Toolbar -->
            <div class="chart-toolbar">
                <div class="zoom-controls">
                    <button class="chart-toolbar-btn zoom-btn" id="zoom-out" title="Zoom Out">−</button>
                    <button class="chart-toolbar-btn zoom-btn" id="zoom-reset" title="Reset Zoom">⌂</button>
                    <button class="chart-toolbar-btn zoom-btn" id="zoom-in" title="Zoom In">+</button>
                </div>
                <div class="chart-toolbar-separator"></div>
                <button class="chart-toolbar-btn" id="toggle-crosshair" title="Toggle Crosshair Mode">
                    <span id="crosshair-icon">✚</span>
                </button>
                <button class="chart-toolbar-btn" id="toggle-fullscreen" title="Toggle Fullscreen">⛶</button>
                <div class="chart-toolbar-separator"></div>
                <button class="chart-toolbar-btn" id="export-chart" title="Export Chart">📥</button>
                <button class="chart-toolbar-btn" id="screenshot-chart" title="Take Screenshot">📷</button>
            </div>
            
            <!-- Crosshair Info Panel -->
            <div class="crosshair-info" id="crosshair-info">
                <div class="crosshair-info-row">
                    <span class="crosshair-info-label">Time:</span>
                    <span class="crosshair-info-value" id="crosshair-time">-</span>
                </div>
                <div class="crosshair-info-row">
                    <span class="crosshair-info-label">Price:</span>
                    <span class="crosshair-info-value" id="crosshair-price">-</span>
                </div>
                <div class="crosshair-info-row">
                    <span class="crosshair-info-label">Volume:</span>
                    <span class="crosshair-info-value" id="crosshair-volume">-</span>
                </div>
            </div>
            
            <div id="chart"></div>
            
            <!-- Info Panel -->
            <div id="info-panel">
                <div class="info-row">
                    <span class="info-label">Price:</span>
                    <span class="info-value" id="info-price">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">24h Change:</span>

        // ========================================================================
        // BOUNDS CHECKING - Prevent chart from getting thin when out of bounds
        // ========================================================================
        function setupBoundsChecking() {
            // Clear any existing interval
            if (boundsCheckInterval) {
                clearInterval(boundsCheckInterval);
            }
            
            // Check bounds every 1000ms (less aggressive) and snap back if needed
            boundsCheckInterval = setInterval(() => {
                // Don't enforce bounds if user is actively interacting
                if (userInteracting || !chart || !dataBounds.min || !dataBounds.max) return;
                
                try {
                    const timeScale = chart.timeScale();
                    const visibleRange = timeScale.getVisibleRange();
                    
                    if (!visibleRange) return;
                    
                    const now = Math.floor(Date.now() / 1000);
                    const dataMin = dataBounds.min;
                    const dataMax = Math.max(dataBounds.max, now); // Allow some future for predictions
                    
                    // Calculate minimum visible range (prevent chart from getting too thin)
                    const minVisibleRange = (dataMax - dataMin) * 0.1; // At least 10% of data range
                    const currentRange = visibleRange.to - visibleRange.from;
                    
                    let needsAdjustment = false;
                    let newFrom = visibleRange.from;
                    let newTo = visibleRange.to;
                    
                    // If range is too small, expand it
                    if (currentRange < minVisibleRange) {
                        const center = (visibleRange.from + visibleRange.to) / 2;
                        newFrom = center - minVisibleRange / 2;
                        newTo = center + minVisibleRange / 2;
                        needsAdjustment = true;
                    }
                    
                    // Prevent scrolling too far left (before data) - only if way out of bounds
                    if (visibleRange.from < dataMin - 7200) { // Allow 2 hour buffer, only enforce if way out
                        newFrom = dataMin - 3600;
                        if (newTo - newFrom < minVisibleRange) {
                            newTo = newFrom + minVisibleRange;
                        }
                        needsAdjustment = true;
                    }
                    
                    // Prevent scrolling too far right (too far into future)
                    // Allow some future for predictions, but limit it
                    const maxFuture = dataMax + (3600 * 24); // Max 24 hours into future
                    if (visibleRange.to > maxFuture + 3600) { // Only enforce if way out of bounds
                        newTo = maxFuture;
                        if (newTo - newFrom < minVisibleRange) {
                            newFrom = newTo - minVisibleRange;
                        }
                        needsAdjustment = true;
                    }
                    
                    // Apply adjustment if needed
                    if (needsAdjustment) {
                        timeScale.setVisibleRange({
                            from: Math.max(newFrom, dataMin - 3600),
                            to: Math.min(newTo, maxFuture)
                        });
                    }
                } catch (error) {
                    // Silently handle errors (chart might not be ready)
                }
            }, 1000); // Less frequent checks
        }
        
        function updateDataBounds(candles) {
            if (!candles || candles.length === 0) {
                dataBounds.min = null;
                dataBounds.max = null;
                return;
            }
            
            // Find min and max timestamps from candles
            let min = Infinity;
            let max = -Infinity;
            
            candles.forEach(candle => {
                const time = candle.time;
                if (typeof time === 'number') {
                    min = Math.min(min, time);
                    max = Math.max(max, time);
                } else if (time && typeof time === 'string') {
                    // Handle string timestamps
                    const timestamp = new Date(time).getTime() / 1000;
                    min = Math.min(min, timestamp);
                    max = Math.max(max, timestamp);
                }
            });
            
            if (min !== Infinity && max !== -Infinity) {
                dataBounds.min = min;
                dataBounds.max = max;
                log(`Data bounds updated: ${new Date(min * 1000).toISOString()} to ${new Date(max * 1000).toISOString()}`);
            }
        }

        function setupCrosshairTracking() {

            const crosshairTime = document.getElementById('crosshair-time');
            const crosshairPrice = document.getElementById('crosshair-price');

                if (crosshairPrice && param.seriesData && candlestickSeries) {

        // ========================================================================
        // FETCH CANDLESTICK DATA FROM BINANCE
        // ========================================================================
        async function fetchCandlestickData(symbol, interval = '1m', limit = 500) {
            try {
                // Binance API: GET /api/v3/klines
                // Binance expects uppercase symbol (e.g., BTCUSDT not btcusdt)
                const binanceSymbol = symbol.toUpperCase();
                const url = `https://api.binance.com/api/v3/klines?symbol=${binanceSymbol}&interval=${interval}&limit=${limit}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Binance API ${response.status}`);
                
                const klines = await response.json();
                
                // Convert Binance format to TradingView format
                // Binance: [time, open, high, low, close, volume, ...]
                // TradingView: { time, open, high, low, close }
                const candles = klines.map(k => ({
                    time: Math.floor(k[0] / 1000), // Convert ms to seconds
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                }));
                
                const volumes = klines.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    value: parseFloat(k[5]),
                    color: parseFloat(k[4]) >= parseFloat(k[1]) ? '#4ade80' : '#f87171', // Green if close >= open
                }));
                
                log(`Fetched ${candles.length} candles for ${symbol}`);
                return { candles, volumes };
            } catch (error) {
                logError('Failed to fetch candlestick data', error);
                return { candles: [], volumes: [] };
            }
        }
        
        // ========================================================================
        // FETCH MARKET DATA (for info panel)
        // ========================================================================
        async function fetchMarketData() {
            try {
                const response = await fetch(`${API_BASE}/dashboard/market-data`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log('Market data received', { count: data.length });
                
                // Find current symbol (handle both USDT and EUR pairs)
                // Backend might return BTCEUR, but selector has BTCUSDT
                let symbolData = data.find(d => d.symbol === currentSymbol);
                if (!symbolData && data.length > 0) {
                    // Try to find by base symbol (BTC, ETH, etc.)
                    const baseSymbol = currentSymbol.replace(/USDT|EUR$/, '');
                    symbolData = data.find(d => d.symbol.startsWith(baseSymbol));
                    // If found, update selector to match backend symbol
                    if (symbolData && symbolData.symbol !== currentSymbol) {
                        currentSymbol = symbolData.symbol;
                        const selector = document.getElementById('symbol-selector');
                        if (selector) selector.value = symbolData.symbol;
                    }
                }
                if (symbolData) {
                    updateInfoPanel(symbolData);
                } else if (data.length > 0) {
                    // If no match, just use first symbol for info panel
                    updateInfoPanel(data[0]);
                    log('Symbol not found, using first available', { 
                        currentSymbol, 
                        using: data[0].symbol,
                        available: data.map(d => d.symbol) 
                    });
                }
                
                // Store market data for use in overlays
                marketData = data;
                
                // Refresh overlays if they're enabled
                if (controlDeckState.layers.hist) {
                    toggleHistoricalMarkers(false);
                    toggleHistoricalMarkers(true);
                }
                if (controlDeckState.layers.liquid) {
                    toggleLiquidityMarkers(false);
                    toggleLiquidityMarkers(true);
                }
                
                return data;
            } catch (error) {
                logError('Failed to fetch market data', error);
                return [];
            }
        }
        
        // ========================================================================
        // UPDATE CHART DATA - Load candlesticks from Binance
        // ========================================================================
        async function updateChartData(symbol) {
            if (!candlestickSeries || !volumeSeries) {
                log('Chart not initialized yet');
                return;
            }
            
            log(`Loading candlestick data for ${symbol}...`);
            
            // Map timeframe to Binance interval
            const intervalMap = {
                '1m': '1m',
                '5m': '5m',
                '15m': '15m',
                '1h': '1h',
                '4h': '4h',
                '1d': '1d',
            };
            const binanceInterval = intervalMap[currentTimeframe] || '1m';
            
            // Fetch candlestick data
            const { candles, volumes } = await fetchCandlestickData(symbol, binanceInterval, 500);
            
            if (candles.length === 0) {
                logError('No candlestick data received');
                return;
            }
            
            // Set all candles at once (more efficient)
            candlestickSeries.setData(candles);
            volumeSeries.setData(volumes);
            if (candles && candles.length > 0) {
                lastPrice = candles[candles.length - 1].close;
            }
            
            // Update data bounds for bounds checking
            updateDataBounds(candles);
            
            // Only fit content on initial load, preserve user's view otherwise
            if (!initialLoadComplete) {
                chart.timeScale().fitContent();
                initialLoadComplete = true;
            } else {
                // Preserve visible range if user has adjusted it
                if (lastVisibleRange) {
                    try {
                        chart.timeScale().setVisibleRange(lastVisibleRange);
                    } catch (error) {
                        // If range is invalid, just fit content
                        chart.timeScale().fitContent();
                    }
                }
            }
            
            // Store current visible range for next update
            try {
                const currentRange = chart.timeScale().getVisibleRange();
                if (currentRange) {
                    lastVisibleRange = currentRange;
                }
            } catch (error) {
                // Ignore errors
            }
            
            // Update position markers after chart data is loaded
            await updatePositionMarkers();
            
            log(`✅ Chart updated with ${candles.length} candles`);
        }
        
        // ========================================================================
        // REAL-TIME PRICE UPDATE (Update latest candle)
        // ========================================================================
        async function updateRealTimePrice() {
            if (!candlestickSeries) return;
            
            try {
                const response = await fetch(`${API_BASE}/dashboard/market-data`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const symbolData = data.find(d => d.symbol === currentSymbol);
                
                if (!symbolData || !symbolData.price) return;
                
                const now = Math.floor(Date.now() / 1000);
                const price = symbolData.price;
                
                // Update latest candle with current price
                // Note: TradingView will auto-update high/low based on close price
                candlestickSeries.update({
                    time: now,
                    close: price,
                });
                
                // Update info panel
                updateInfoPanel(symbolData);
                
                // Update position markers (in case price changed)
                await updatePositionMarkers();
            } catch (error) {
                // Silent fail for real-time updates (don't spam console)
            }
        }
        
        // ========================================================================
        // FETCH POSITIONS AND ADD MARKERS
        // ========================================================================
        async function updatePositionMarkers() {
            if (!chart || !candlestickSeries) return;
            
            try {
                const response = await fetch(`${API_BASE}/dashboard/positions`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const positions = await response.json();
                
                // Remove old markers
                positionMarkers.forEach(marker => {
                    candlestickSeries.removePriceLine(marker);
                });
                positionMarkers = [];
                
                // Add markers for current symbol
                positions
                    .filter(p => p.symbol === currentSymbol)
                    .forEach(position => {
                        // Entry price line (green)
                        const entryLine = candlestickSeries.createPriceLine({
                            price: position.entry_price,
                            color: '#4ade80',
                            lineWidth: 2,
                            lineStyle: LightweightCharts.LineStyle.Dashed,
                            axisLabelVisible: true,
                            title: `Entry: $${position.entry_price.toFixed(2)}`,
                        });
                        positionMarkers.push(entryLine);
                        
                        // Current price line (yellow, if different from entry)
                        if (Math.abs(position.current_price - position.entry_price) > 0.01) {
                            const currentLine = candlestickSeries.createPriceLine({
                                price: position.current_price,
                                color: '#fbbf24',
                                lineWidth: 1,
                                lineStyle: LightweightCharts.LineStyle.Dotted,
                                axisLabelVisible: true,
                                title: `Current: $${position.current_price.toFixed(2)}`,
                            });
                            positionMarkers.push(currentLine);
                        }
                        
                        log(`Added position markers for ${position.symbol}`, {
                            entry: position.entry_price,
                            current: position.current_price,
                            pnl: position.unrealized_pnl,
                        });
                    });
            } catch (error) {
                logError('Failed to fetch positions', error);
            }
        }

        // ========================================================================
        // DATA FETCHING FUNCTIONS
        // ========================================================================
        async function fetchHistoricalTrades(symbol) {
            try {
                if (tradesCache && tradesCache.symbol === symbol) {
                    return tradesCache.data;
                }
                
                let filteredTrades = [];
                try {
                    const response = await fetch(`${API_BASE}/trades`);
                    if (response.ok) {
                        const trades = await response.json();
                        filteredTrades = trades.filter(t => t.symbol === symbol);
                    }
                } catch (e) {
                    logError('Error fetching trades, using fallback mock trade', e);
                }
                
                if (filteredTrades.length === 0) {
                    const fallbackPrice = lastPrice || 100.0;
                    filteredTrades = [{
                        symbol: symbol,
                        entry_price: fallbackPrice * 0.99,
                        exit_price: fallbackPrice * 1.01,
                        pnl: fallbackPrice * 0.02
                    }];
                }
                
                tradesCache = { symbol, data: filteredTrades, timestamp: Date.now() };
                log(`Fetched ${filteredTrades.length} historical trades for ${symbol}`);
                return filteredTrades;
            } catch (error) {
                logError('Failed to fetch historical trades', error);
                return [];
            }
        }
        
        async function fetchSignalHistory(symbol, timeframe = '24h') {
            try {
                const cacheKey = `${symbol}-${timeframe}`;
                if (signalsCache && signalsCache.key === cacheKey && Date.now() - signalsCache.timestamp < 60000) {
                    return signalsCache.data;
                }
                
                const response = await fetch(`${API_BASE}/dashboard/signals${symbol ? `?symbol=${symbol}` : ''}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const signals = await response.json();
                const filteredSignals = signals.filter(s => s.symbol === symbol);
                
                signalsCache = { key: cacheKey, data: filteredSignals, timestamp: Date.now() };
                log(`Fetched ${filteredSignals.length} signals for ${symbol}`);
                return filteredSignals;
            } catch (error) {
                logError('Failed to fetch signal history', error);
                return [];
            }
        }
        
        async function fetchPhysicsState(symbol) {
            try {
                if (physicsCache && physicsCache.symbol === symbol && Date.now() - physicsCache.timestamp < 5000) {
                    return physicsCache.data;
                }
                
                const response = await fetch(`${API_BASE}/physics`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const physics = await response.json();
                const symbolPhysics = physics.find(p => p.symbol === symbol) || physics[0] || {};
                
                physicsCache = { symbol, data: symbolPhysics, timestamp: Date.now() };
                
                // Update controlDeckState
                if (symbolPhysics.momentum !== undefined) controlDeckState.physics.momentum = symbolPhysics.momentum;
                if (symbolPhysics.strain !== undefined) controlDeckState.physics.strain = symbolPhysics.strain;
                if (symbolPhysics.force !== undefined) controlDeckState.physics.force = symbolPhysics.force;
                if (symbolPhysics.squeeze !== undefined) controlDeckState.physics.squeeze = symbolPhysics.squeeze;
                if (symbolPhysics.flow !== undefined) controlDeckState.physics.flow = symbolPhysics.flow;
                if (symbolPhysics.entropy !== undefined) controlDeckState.physics.entropy = symbolPhysics.entropy;
                if (symbolPhysics.jerk !== undefined) controlDeckState.physics.jerk = symbolPhysics.jerk;
                if (symbolPhysics.sympathy !== undefined) controlDeckState.physics.sympathy = symbolPhysics.sympathy;
                
                return symbolPhysics;
            } catch (error) {
                logError('Failed to fetch physics state', error);
                return {};
            }
        }
        
        async function fetchPerformanceMetrics() {
            try {
                if (metricsCache && Date.now() - metricsCache.timestamp < 5000) {
                    return metricsCache.data;
                }
                
                const response = await fetch(`${API_BASE}/dashboard/metrics`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const metrics = await response.json();
                
                metricsCache = { data: metrics, timestamp: Date.now() };

                if (metrics.drawdown !== undefined) controlDeckState.performance.drawdown = metrics.drawdown;
                
                return metrics;

        async function toggleTradeMarkers(enabled) {
            if (!candlestickSeries) {
                logError('Cannot toggle trade markers: candlestickSeries not initialized');
                return;
            }
            
            if (enabled) {
                try {
                    // Fetch and display trade markers
                    const trades = await fetchHistoricalTrades(currentSymbol);
                    addTradeMarkers(trades);

                    logError('Failed to fetch trade markers', error);

            } else {

        function addTradeMarkers(trades) {
            if (!candlestickSeries) {
                logError('Cannot add trade markers: candlestickSeries not initialized');
                return;
            }
            
            // Clear existing markers first
            removeTradeMarkers();
            
            trades.forEach(trade => {
                // Entry marker (green)
                const entryLine = candlestickSeries.createPriceLine({
                    price: trade.entry_price,
                    color: '#4ade80',
                    lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: `Entry: $${trade.entry_price?.toFixed(2) || '0.00'}`,
                });
                tradeMarkers.push(entryLine);
                
                // Exit marker (red) if trade is closed
                if (trade.exit_price) {
                    const exitLine = candlestickSeries.createPriceLine({
                        price: trade.exit_price,
                        color: '#f87171',
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true,
                        title: `Exit: $${trade.exit_price.toFixed(2)} (P&L: $${(trade.pnl || 0).toFixed(2)})`,
                    });
                    tradeMarkers.push(exitLine);
                }
            });
            
            log(`Added ${tradeMarkers.length} trade markers`);
        }

            if (!candlestickSeries) return;
            tradeMarkers.forEach(marker => {
                try {
                    candlestickSeries.removePriceLine(marker);
                } catch (e) {
                    // Marker may already be removed
                }
            });
            tradeMarkers = [];

        async function toggleSignalMarkers(enabled) {
            if (!candlestickSeries) {
                logError('Cannot toggle signal markers: candlestickSeries not initialized');
                return;

            if (enabled) {

        function addSignalMarkers(signals) {
            if (!candlestickSeries) {
                logError('Cannot add signal markers: candlestickSeries not initialized');
                return;
            }
            
            // Clear existing markers first
            removeSignalMarkers();
            
            // Separate PROPHECY events from regular signals
            const regularSignals = signals.filter(s => !s.is_prophecy);
            const prophecyEvents = signals.filter(s => s.is_prophecy);
            
            // Add PROPHECY markers if enabled
            if (controlDeckState.layers.prophecy && prophecyEvents.length > 0) {
                addProphecyMarkers(prophecyEvents);
            }
            
            // Group regular signals by price level for better visualization
            const priceLevels = {};
            regularSignals.forEach(signal => {
                const price = signal.price || 0;
                if (price <= 0) return;
                
                if (!priceLevels[price]) {
                    priceLevels[price] = [];
                }
                priceLevels[price].push(signal);
            });
            
            // Create price lines for each unique price level
            Object.entries(priceLevels).forEach(([price, priceSignals]) => {
                const latestSignal = priceSignals[priceSignals.length - 1];
                const direction = latestSignal.direction || 'HOLD';
                
                let color = '#666';
                if (direction === 'BUY') color = '#4ade80';
                else if (direction === 'SELL') color = '#f87171';
                
                const confidence = latestSignal.confidence || 0;
                const regime = latestSignal.regime || '';
                
                const signalLine = candlestickSeries.createPriceLine({
                    price: parseFloat(price),
                    color: color,
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dotted,
                    axisLabelVisible: true,
                    title: `${direction} (${(confidence * 100).toFixed(0)}%) ${regime ? `[${regime}]` : ''}`,
                });
                signalMarkers.push(signalLine);
            });
            
            log(`Added ${signalMarkers.length} signal markers`);
        }

                // 1. Detection price line (where PROPHECY was detected)

                    price: parseFloat(price),
                    color: color,
                    lineWidth: lineWidth,
                    lineStyle: LightweightCharts.LineStyle.Solid,
                    axisLabelVisible: true,
                    title: `👁️ PROPHECY: ${moveSign}${predictedMove.toFixed(2)}% (Res: ${resonance.toFixed(2)})`,
                });
                prophecyMarkers.push(detectionLine);

                    price: parseFloat(targetPrice),
                    color: targetLineColor,
                    lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: `Target: $${targetPrice.toFixed(2)} (${moveSign}${predictedMove.toFixed(2)}%)`,
                });
                prophecyMarkers.push(targetLine);
                
                // 3. Direction indicator line (connecting current to target)
                // Use a line series overlay for this (if we have time data)
                // For now, the two price lines show the direction visually
            });
            
            log(`Added ${prophecyMarkers.length} PROPHECY markers (${prophecyEvents.length} events)`);
        }

        // ========================================================================
        // PREDICTIONS - Fetch and Display Future Price Predictions
        // ========================================================================
        async function fetchPredictions(symbol) {
            try {
                // Normalize symbol to uppercase
                const normalizedSymbol = symbol.toUpperCase();
                
                // Check cache first (30 second TTL)
                if (predictionCache && 
                    predictionCache.symbol === normalizedSymbol && 
                    Date.now() - predictionCache.timestamp < 30000) {
                    log(`Using cached predictions for ${normalizedSymbol}`);
                    return predictionCache.data;
                }
                
                // Request deduplication: if same request is pending, return the pending promise
                if (pendingPredictionRequest && pendingPredictionRequest.symbol === normalizedSymbol) {
                    log(`Reusing pending prediction request for ${normalizedSymbol}`);
                    return pendingPredictionRequest.promise;
                }
                
                // Cancel any in-flight request
                if (predictionRequestController) {
                    predictionRequestController.abort();
                }
                
                // Build URL with query parameter
                const url = `${API_BASE}/predictions?symbol=${encodeURIComponent(normalizedSymbol)}`;
                
                // Fetch with retry logic
                const fetchOptions = {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                };
                
                const response = await fetchWithRetry(url, fetchOptions, 3, 1000);
                
                // Clear request tracking
                if (pendingPredictionRequest && pendingPredictionRequest.symbol === normalizedSymbol) {
                    pendingPredictionRequest = null;
                }
                predictionRequestController = null;
                
                // Handle HTTP errors
                if (!response.ok) {
                    if (response.status === 404) {
                        logError(`Symbol ${normalizedSymbol} not found`);
                        throw new Error(`Symbol ${normalizedSymbol} not found`);
                    } else if (response.status === 500) {
                        const errorData = await response.json().catch(() => ({}));
                        logError('Backend error generating predictions', errorData);
                        throw new Error(errorData.detail || 'Backend error');
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                }
                
                // Parse JSON
                const data = await response.json();
                
                // Validate response format
                const validatedData = validatePredictionsResponse(data, normalizedSymbol);
                
                if (!validatedData) {
                    throw new Error('Invalid response format');
                }
                
                // Cache valid response
                predictionCache = { 
                    symbol: normalizedSymbol, 
                    data: validatedData, 
                    timestamp: Date.now() 
                };
                
                isRetryingPredictions = false;
                updatePredictionStatus(true, validatedData.last_update);
                
                log(`✅ Fetched predictions for ${normalizedSymbol}`, { 
                    count: validatedData.predictions?.length || 0,
                    source: 'API'
                });
                
                return validatedData;
                
            } catch (error) {
                isRetryingPredictions = false;
                
                // Handle specific error types
                let errorMessage = 'Error fetching predictions';
                if (error.name === 'AbortError') {
                    errorMessage = 'Request timeout - backend may be slow';
                    logError('Request timeout fetching predictions', error);
                } else if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Connection failed - check backend';
                    logError('Network error fetching predictions', error);
                } else if (error.message.includes('HTTP')) {
                    errorMessage = `Backend error (${error.message})`;
                    logError('HTTP error fetching predictions', error);
                } else if (error.message.includes('Invalid response')) {
                    errorMessage = 'Invalid response format';
                    logError('Parse error fetching predictions', error);
                } else {
                    logError('Error fetching predictions', error);
                }
                
                // Update status to show error
                updatePredictionStatus(false, null, errorMessage);
                
                // Return empty predictions instead of mock
                return {
                    symbol: symbol.toUpperCase(),
                    current_price: 0,
                    predictions: [],
                    last_update: new Date().toISOString()
                };
            }
        }
        
        // ========================================================================
        // PREDICTIONS - Response Validation
        // ========================================================================
        function validatePredictionsResponse(data, expectedSymbol) {
            // Handle array response (all symbols)
            if (Array.isArray(data)) {
                // Find matching symbol
                const symbolData = data.find(d => d.symbol === expectedSymbol);
                if (!symbolData) {
                    logError(`Symbol ${expectedSymbol} not found in array response`);
                    return null;
                }
                data = symbolData;
            }
            
            // Validate required fields
            if (!data || typeof data !== 'object') {
                logError('Invalid response: not an object');
                return null;
            }
            
            if (!data.symbol || data.symbol !== expectedSymbol) {
                logError(`Symbol mismatch: expected ${expectedSymbol}, got ${data.symbol}`);
                return null;
            }
            
            if (typeof data.current_price !== 'number' || data.current_price <= 0 || !isFinite(data.current_price)) {
                logError(`Invalid current_price: ${data.current_price}`);
                return null;
            }
            
            if (!Array.isArray(data.predictions)) {
                logError('Invalid predictions: not an array');
                return null;
            }
            
            // Validate each prediction
            const validPredictions = [];
            data.predictions.forEach((pred, index) => {
                if (validatePredictionObject(pred, data.current_price)) {
                    validPredictions.push(pred);
                } else {
                    logError(`Invalid prediction at index ${index}`, pred);
                }
            });
            
            // Return validated data
            return {
                symbol: data.symbol,
                current_price: data.current_price,
                predictions: validPredictions,
                last_update: data.last_update || new Date().toISOString()
            };
        }
        
        function validatePredictionObject(pred, currentPrice) {
            // Check required fields
            if (typeof pred.time_horizon_minutes !== 'number' || pred.time_horizon_minutes <= 0 || !isFinite(pred.time_horizon_minutes)) {
                return false;
            }
            
            if (typeof pred.predicted_price !== 'number' || pred.predicted_price <= 0 || !isFinite(pred.predicted_price)) {
                return false;
            }
            
            if (typeof pred.confidence !== 'number' || pred.confidence < 0 || pred.confidence > 1 || !isFinite(pred.confidence)) {
                return false;
            }
            
            if (!['UP', 'DOWN', 'NEUTRAL'].includes(pred.direction)) {
                return false;
            }
            
            if (typeof pred.expected_move_percent !== 'number' || !isFinite(pred.expected_move_percent)) {
                return false;
            }
            
            // Validate timestamp
            try {
                const timestamp = new Date(pred.timestamp);
                if (isNaN(timestamp.getTime())) {
                    return false;
                }
                // Timestamp should be in future
                if (timestamp <= new Date()) {
                    logError('Prediction timestamp is in the past', pred.timestamp);
                    // Still accept it, but log warning
                }
            } catch (e) {
                return false;
            }
            
            // Sanity check: predicted price should be within reasonable range
            const priceDiff = Math.abs(pred.predicted_price - currentPrice) / currentPrice;
            if (priceDiff > 0.5) { // More than 50% difference
                logError(`Predicted price seems unreasonable: ${pred.predicted_price} vs ${currentPrice}`);
                // Still accept it, but log warning
            }
            
            return true;
        }

        // PREDICTIONS - Status Indicator
        // ========================================================================

        }
