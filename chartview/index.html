        function addPredictionOverlay(predictionData) {
            if (!chart || !candlestickSeries || !predictionData) {
                logError('Chart or prediction data missing');
                return;
            }
            
            // Validate prediction data structure
            if (!predictionData.predictions || !Array.isArray(predictionData.predictions)) {
                logError('Invalid prediction data: predictions array missing');
                return;
            }
            
            // Remove existing overlay first
            removePredictionOverlay();
            
            const predictions = predictionData.predictions;
            
            // Handle empty predictions
            if (predictions.length === 0) {
                log('No predictions to display');
                // Optionally show a message to user
                return;
            }
            
            // Get current price with fallback
            let currentPrice = predictionData.current_price;
            if (!currentPrice || currentPrice <= 0) {
                // Try to get from info panel
                const priceText = document.getElementById('info-price')?.textContent;
                if (priceText) {
                    currentPrice = parseFloat(priceText.replace(/[^0-9.]/g, ''));
                }
            }
            
            if (!currentPrice || currentPrice <= 0) {
                logError('Cannot determine current price for predictions');
                return;
            }
            
            const now = Math.floor(Date.now() / 1000);
            
            // Constants for prediction bounds
            const MAX_PREDICTION_HORIZON_MINUTES = 1440; // 24 hours max
            const MAX_PRICE_MULTIPLIER = 10; // Don't show predictions >10x current price
            const MIN_PRICE_MULTIPLIER = 0.1; // Don't show predictions <0.1x current price
            
            // Helper functions for confidence bounds and opacity (must be defined before use)
            function getOpacityForHorizon(horizonMinutes) {
                if (horizonMinutes <= 5) return 0.4;
                if (horizonMinutes <= 15) return 0.3;
                if (horizonMinutes <= 30) return 0.2;
                return 0.1; // 30min+
            }
            
            function calculateConfidenceBounds(predictedPrice, confidence, currentPrice) {
                const uncertaintyFactor = 0.6; // Adjustable scale factor
                const confidenceRange = 1 - confidence; // Lower confidence = wider band
                // Use percentage of predicted price for band width
                const priceRange = predictedPrice * confidenceRange * uncertaintyFactor;
                const upperBound = predictedPrice + priceRange;
                const lowerBound = Math.max(0.01, predictedPrice - priceRange); // Ensure positive
                
                // Ensure bounds respect price validation limits
                const maxPrice = currentPrice * MAX_PRICE_MULTIPLIER;
                const minPrice = currentPrice * MIN_PRICE_MULTIPLIER;
                
                return {
                    upper: Math.min(upperBound, maxPrice),
                    lower: Math.max(lowerBound, minPrice),
                    center: predictedPrice
                };
            }
            
            // Group predictions by time horizon for opacity segments
            const predictionSegments = {
                short: [], // 0-5min
                medium: [], // 5-15min
                long: [], // 15-30min
                veryLong: [] // 30min+
            };
            
            // #region agent log - Debug prediction bounds
            fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:addPredictionOverlay',message:'Prediction bounds check',data:{currentPrice,predictionsCount:predictions.length,maxHorizon:MAX_PREDICTION_HORIZON_MINUTES,maxPrice:currentPrice*MAX_PRICE_MULTIPLIER,minPrice:currentPrice*MIN_PRICE_MULTIPLIER},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
            // #endregion
            
            // Add prediction points for each time horizon
            let maxHorizon = 0;
            let filteredCount = 0;
            predictions.forEach((pred, index) => {
                try {
                    // Validate time horizon - cap at maximum
                    let horizonMinutes = pred.time_horizon_minutes || 0;
                    if (horizonMinutes > MAX_PREDICTION_HORIZON_MINUTES) {
                        // #region agent log - Debug prediction bounds
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:addPredictionOverlay',message:'Prediction horizon capped',data:{index,originalHorizon:horizonMinutes,cappedHorizon:MAX_PREDICTION_HORIZON_MINUTES},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
                        // #endregion
                        horizonMinutes = MAX_PREDICTION_HORIZON_MINUTES;
                        filteredCount++;
                    }
                    
                    // Validate predicted price - filter out extreme values
                    let predictedPrice = pred.predicted_price;
                    if (!predictedPrice || predictedPrice <= 0 || !isFinite(predictedPrice)) {
                        // #region agent log - Debug prediction bounds
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:addPredictionOverlay',message:'Prediction price invalid',data:{index,predictedPrice},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
                        // #endregion
                        return; // Skip this prediction
                    }
                    
                    // Check if price is within reasonable bounds
                    const priceRatio = predictedPrice / currentPrice;
                    if (priceRatio > MAX_PRICE_MULTIPLIER || priceRatio < MIN_PRICE_MULTIPLIER) {
                        // #region agent log - Debug prediction bounds
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:addPredictionOverlay',message:'Prediction price out of bounds',data:{index,predictedPrice,currentPrice,priceRatio,maxRatio:MAX_PRICE_MULTIPLIER,minRatio:MIN_PRICE_MULTIPLIER},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
                        // #endregion
                        filteredCount++;
                        return; // Skip extreme predictions
                    }
                    
                    // Parse timestamp
                    let futureTime = new Date(pred.timestamp);
                    if (isNaN(futureTime.getTime())) {
                        // Fallback: calculate from time_horizon_minutes (using capped value)
                        const futureTimeSeconds = now + (horizonMinutes * 60);
                        futureTime = new Date(futureTimeSeconds * 1000);
                    } else {
                        // Validate timestamp isn't too far in the future
                        const maxFutureTime = now + (MAX_PREDICTION_HORIZON_MINUTES * 60);
                        const futureTimeSeconds = Math.floor(futureTime.getTime() / 1000);
                        if (futureTimeSeconds > maxFutureTime) {
                            // Cap the timestamp
                            futureTime = new Date(maxFutureTime * 1000);
                            filteredCount++;
                        }
                    }
                    
                    const futureTimeSeconds = Math.floor(futureTime.getTime() / 1000);
                    maxHorizon = Math.max(maxHorizon, horizonMinutes);
                    
                    // Calculate confidence bounds
                    const bounds = calculateConfidenceBounds(predictedPrice, pred.confidence, currentPrice);
                    
                    // Store prediction with bounds and time
                    const predictionPoint = {
                        time: futureTimeSeconds,
                        horizonMinutes: horizonMinutes,
                        predictedPrice: predictedPrice,
                        confidence: pred.confidence,
                        direction: pred.direction,
                        bounds: bounds,
                        opacity: getOpacityForHorizon(horizonMinutes)
                    };
                    
                    // Group by time horizon for opacity segments
                    if (horizonMinutes <= 5) {
                        predictionSegments.short.push(predictionPoint);
                    } else if (horizonMinutes <= 15) {
                        predictionSegments.medium.push(predictionPoint);
                    } else if (horizonMinutes <= 30) {
                        predictionSegments.long.push(predictionPoint);
                    } else {
                        predictionSegments.veryLong.push(predictionPoint);
                    }
                } catch (error) {
                    logError(`Error processing prediction ${index}`, error);
                }
            });
            
            // #region agent log - Debug prediction bounds
            if (filteredCount > 0) {
                const remainingCount = predictionSegments.short.length + 
                                      predictionSegments.medium.length + 
                                      predictionSegments.long.length + 
                                      predictionSegments.veryLong.length;
                fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:addPredictionOverlay',message:'Predictions filtered',data:{filteredCount,totalCount:predictions.length,remainingCount},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
            }
            // #endregion
            
            // Create area series for confidence bands with fading opacity
            const allPredictions = [
                ...predictionSegments.short,
                ...predictionSegments.medium,
                ...predictionSegments.long,
                ...predictionSegments.veryLong
            ].sort((a, b) => a.time - b.time);
            
            if (allPredictions.length === 0) {
                log('No valid predictions to display after filtering');
                return;
            }
            
            // Create area series for each opacity segment
            // Strategy: Create upper and lower line series, then use area series to fill between them
            // Since Lightweight Charts area series fills to zero, we'll create the band by:
            // 1. Upper area series (fills down from upper bound)
            // 2. Lower area series (fills up from lower bound, using inverted approach)
            // The visual overlap creates the confidence band
            
            const segments = [
                { name: 'short', predictions: predictionSegments.short, opacity: 0.4 },
                { name: 'medium', predictions: predictionSegments.medium, opacity: 0.3 },
                { name: 'long', predictions: predictionSegments.long, opacity: 0.2 },
                { name: 'veryLong', predictions: predictionSegments.veryLong, opacity: 0.1 }
            ];
            
            segments.forEach(segment => {
                if (segment.predictions.length === 0) return;
                
                // Build upper and lower bound lines
                const upperLineData = [{ time: now, value: currentPrice }];
                const lowerLineData = [{ time: now, value: currentPrice }];
                
                segment.predictions.forEach(pred => {
                    upperLineData.push({ time: pred.time, value: pred.bounds.upper });
                    lowerLineData.push({ time: pred.time, value: pred.bounds.lower });
                });
                
                // Create upper area series (fills down from upper bound)
                try {
                    const upperAreaSeries = chart.addAreaSeries({
                        lineColor: `rgba(168, 85, 247, ${segment.opacity * 0.6})`,
                        topColor: `rgba(168, 85, 247, ${segment.opacity})`,
                        bottomColor: `rgba(168, 85, 247, ${segment.opacity * 0.3})`,
                        priceScaleId: 'right',
                        title: `ML Predictions Upper (${segment.name})`,
                        visible: true,
                    });
                    
                    upperAreaSeries.setData(upperLineData);
                    
                    // Create lower area series (we'll use it to create the bottom of the band)
                    // Actually, to create a proper band, we need the area between upper and lower
                    // Let's create a second area series that represents the lower bound
                    // and use line series for the boundaries
                    const lowerAreaSeries = chart.addAreaSeries({
                        lineColor: `rgba(168, 85, 247, ${segment.opacity * 0.6})`,
                        topColor: `rgba(168, 85, 247, ${segment.opacity * 0.3})`,
                        bottomColor: `rgba(168, 85, 247, 0)`,
                        priceScaleId: 'right',
                        title: `ML Predictions Lower (${segment.name})`,
                        visible: true,
                    });
                    
                    lowerAreaSeries.setData(lowerLineData);
                    
                    // Store both series
                    predictionAreaSeries.push({
                        upperSeries: upperAreaSeries,
                        lowerSeries: lowerAreaSeries,
                        opacity: segment.opacity
                    });
                } catch (error) {
                    logError(`Failed to create area series for ${segment.name}`, error);
                }
            });
            
            // Extend chart timeline to show future (but cap at 24 hours)
            if (maxHorizon > 0) {
                try {
                    const timeScale = chart.timeScale();
                    const visibleRange = timeScale.getVisibleRange();
                    if (visibleRange) {
                        // Cap maxHorizon to prevent extending too far
                        const cappedHorizon = Math.min(maxHorizon, MAX_PREDICTION_HORIZON_MINUTES);
                        const futureTime = now + (cappedHorizon * 60);
                        const extendedTo = Math.max(visibleRange.to, futureTime);
                        
                        // #region agent log - Debug prediction bounds
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:extendTimeline',message:'Extending timeline',data:{maxHorizon,cappedHorizon,futureTime,extendedTo,now,currentRange:visibleRange.to-visibleRange.from},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'J'})}).catch(()=>{});
                        // #endregion
                        
                        timeScale.setVisibleRange({
                            from: visibleRange.from,
                            to: extendedTo
                        });
                    }
                } catch (error) {
                    logError('Failed to extend timeline', error);
                }
            }
            
            // Add "NOW" marker line
            try {
                const nowLine = candlestickSeries.createPriceLine({
                    price: currentPrice,
                    color: '#a855f7',
                    lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Solid,
                    axisLabelVisible: true,
                    title: 'NOW',
                });
                predictionMarkers.push(nowLine);
            } catch (error) {
                logError('Failed to create NOW marker', error);
            }
            
            log(`✅ Added prediction overlay with ${predictions.length} predictions`);
        }
        
        function removePredictionOverlay() {
            if (!chart || !candlestickSeries) return;
            
            // Remove prediction series
            if (predictionSeries) {
                chart.removeSeries(predictionSeries);
                predictionSeries = null;
            }
            
            // Remove prediction markers
            predictionMarkers.forEach(marker => {
                try {
                    candlestickSeries.removePriceLine(marker);
                } catch (e) {
                    // Marker may already be removed
                }
            });
            predictionMarkers = [];
        }
        
        function handleParameterUpdate(param, value) {
            log(`Parameter update: ${param} = ${value}`);
            
            // Update the parameter in state (in case it wasn't already)
            if (controlDeckState.parameters.hasOwnProperty(param)) {
                controlDeckState.parameters[param] = value;
            }
            
            switch(param) {
                case 'smoothingLevel':
                    // Signal Fidelity - affects signal processing and smoothing
                    // Could smooth the candlestick data here
                    // For now, we'll update the chart's visual smoothing
                    if (chart) {
                        chart.applyOptions({
                            layout: {
                                fontSize: Math.max(10, 12 - value * 2), // Adjust font size based on smoothing
                            }
                        });
                    }
                    log(`Signal fidelity (smoothing) updated to ${value}`);
                    // Note: This could trigger signal recalculation if needed
                    break;
                case 'masterSensitivity':
                    // Master sensitivity - affects signal aggregation
                    // Store the value but don't reset view unnecessarily
                    log(`Master sensitivity updated to ${value}`);
                    // Could trigger signal recalculation here
                    // Don't adjust chart view as it's disruptive
                    break;
                case 'friction':
                case 'elasticity':
                    // Physics parameters - update simulation lines if visible
                    log(`Physics parameter ${param} updated to ${value}`);
                    if (controlDeckState.layers.sim && simulationLines.length > 0) {
                        // Recreate simulation lines with new parameters
                        toggleSimulationLines(false);
                        setTimeout(() => toggleSimulationLines(true), 100);
                    }
                    break;
                case 'drift':
                case 'volatility':
                    // Update simulation lines if they're visible
                    log(`Physics parameter ${param} updated to ${value}`);
                    if (controlDeckState.layers.sim && simulationLines.length > 0) {
                        // Remove old lines and recreate with new values
                        toggleSimulationLines(false);
                        setTimeout(() => toggleSimulationLines(true), 100);
                    }
                    break;
                default:
                    log(`Parameter ${param} updated to ${value} (no specific handler)`);
            }
        }
        
        // ========================================================================
        // INITIALIZATION
        // ========================================================================
        async function init() {
            log('🚀 Trading Chart View - Initializing...');
            
            // Check for URL parameters (from opportunities/prophecy views)
            const urlParams = new URLSearchParams(window.location.search);
            const symbolParam = urlParams.get('symbol');
            const showPredictionsParam = urlParams.get('showPredictions');
            const showProphecyParam = urlParams.get('showProphecy');
            const highlightTimeParam = urlParams.get('highlightTime');
            const highlightPriceParam = urlParams.get('highlightPrice');
            
            if (symbolParam) {
                // Normalize symbol to uppercase for consistency
                currentSymbol = symbolParam.toUpperCase();
                // Update selector
                const selector = document.getElementById('symbol-selector');
                if (selector) selector.value = currentSymbol;
            }
            
            // Enable predictions layer if showPredictions parameter is set
            if (showPredictionsParam === 'true' || showPredictionsParam === '1') {
                controlDeckState.layers.predictions = true;
            }
            
            // Enable PROPHECY layer if showProphecy parameter is set
            if (showProphecyParam === 'true' || showProphecyParam === '1') {
                controlDeckState.layers.prophecy = true;
            }
            
            // Add highlighting for specific time/price if provided
            if (highlightTimeParam || highlightPriceParam) {
                // Store highlight parameters for use after chart initialization
                window.highlightParams = {
                    time: highlightTimeParam,
                    price: highlightPriceParam ? parseFloat(highlightPriceParam) : null
                };
                log('Highlight parameters received:', window.highlightParams);
            }
            
            // Initialize Control Deck
            initControlDeck();
            
            // Add highlight markers if parameters provided
            if (window.highlightParams) {
                setTimeout(() => {
                    addHighlightMarkers(window.highlightParams);
                }, 2000); // Wait for chart to be fully initialized
            }
            
            // Setup Control Deck event listeners
            document.addEventListener('controldeck:toggle-layer', (e) => {
                if (!e.detail || !e.detail.layer) {
                    logError('Invalid toggle-layer event', e);
                    return;
                }
                
                const { layer, enabled } = e.detail;
                log(`Toggle layer event received: ${layer} = ${enabled}`);
                
                // Temporarily disable bounds checking during toggle
                userInteracting = true;
                setTimeout(() => { userInteracting = false; }, 2000);
                
                // Store visible range before toggle
                try {
                    const currentRange = chart?.timeScale()?.getVisibleRange();
                    if (currentRange) {
                        lastVisibleRange = currentRange;
                    }
                } catch (error) {
                    // Ignore
                }
                
                handleLayerToggle(layer, enabled);
            });
            
            document.addEventListener('controldeck:update-parameter', (e) => {
                if (!e.detail || !e.detail.param) {
                    logError('Invalid update-parameter event', e);
                    return;
                }
                
                const { param, value } = e.detail;
                log(`Parameter update event received: ${param} = ${value}`);
                
                // Temporarily disable bounds checking
                userInteracting = true;
                setTimeout(() => { userInteracting = false; }, 1000);
                
                handleParameterUpdate(param, value);
            });
            
            // Check backend
            await checkBackend();
            setInterval(checkBackend, 5000);
            
            // #region agent log - Debug navigation links
            // Instrument navigation links to debug why they don't work
            function instrumentNavLinks() {
                const navLinks = document.querySelectorAll('.nav a');
                fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:instrumentNavLinks',message:'Nav links found',data:{count:navLinks.length,links:Array.from(navLinks).map(a=>({href:a.href,target:a.target,display:window.getComputedStyle(a).display,visibility:window.getComputedStyle(a).visibility,pointerEvents:window.getComputedStyle(a).pointerEvents,zIndex:window.getComputedStyle(a).zIndex,position:window.getComputedStyle(a).position}))},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'A'})}).catch(()=>{});
                
                navLinks.forEach((link, index) => {
                    // Check for overlaying elements
                    const rect = link.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const elementAtPoint = document.elementFromPoint(centerX, centerY);
                    const navContainer = link.closest('.nav');
                    const navZIndex = navContainer ? window.getComputedStyle(navContainer).zIndex : 'none';
                    fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:elementAtPoint',message:'Element at point check',data:{index,linkHref:link.href,elementAtPoint:elementAtPoint?elementAtPoint.tagName:null,elementAtPointId:elementAtPoint?.id||null,elementAtPointClass:elementAtPoint?.className||null,elementAtPointZIndex:elementAtPoint?window.getComputedStyle(elementAtPoint).zIndex:'none',isLink:elementAtPoint===link,navZIndex},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'F'})}).catch(()=>{});
                    
                    // Add click listener (both capture and bubble)
                    link.addEventListener('click', (e) => {
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:nav-click',message:'Nav link clicked capture',data:{href:link.href,target:link.target,defaultPrevented:e.defaultPrevented,isTrusted:e.isTrusted,phase:'capture'},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'C'})}).catch(()=>{});
                    }, true);
                    
                    link.addEventListener('click', (e) => {
                        fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:nav-click',message:'Nav link clicked bubble',data:{href:link.href,defaultPrevented:e.defaultPrevented,phase:'bubble'},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'C'})}).catch(()=>{});
                    }, false);
                });
            }
            
            // Instrument immediately
            instrumentNavLinks();
            
            // Also check after chart initialization (chart might overlay)
            setTimeout(() => {
                fetch('http://127.0.0.1:7243/ingest/ea1b814b-bb8a-463b-a11f-4c4b4858de01',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:'chartview/index.html:post-chart-check',message:'Re-checking nav links after chart init',data:{chartExists:!!document.getElementById('chart'),chartZIndex:document.getElementById('chart')?window.getComputedStyle(document.getElementById('chart')).zIndex:'none'},timestamp:Date.now(),sessionId:'debug-session',runId:'run1',hypothesisId:'I'})}).catch(()=>{});
                instrumentNavLinks();
            }, 2000);
            // #endregion
            
            // Initialize chart (wait for library to load)
            initChart();
            
            // Wait for chart to initialize and layout to settle
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Force a resize after initialization to ensure proper sizing
            if (chart) {
                setTimeout(() => {
                    const chartContainer = document.getElementById('chart');
                    if (chartContainer && chart) {
                        const width = chartContainer.clientWidth || window.innerWidth;
                        const height = chartContainer.clientHeight || (window.innerHeight - 100);
                        if (width > 0 && height > 0) {
                            chart.applyOptions({
                                width: Math.floor(width),
                                height: Math.floor(height),
                            });
                            log(`Post-init chart resize to ${Math.floor(width)}x${Math.floor(height)}`);
                        }
                    }
                }, 300);
            }
            
            // Load initial candlestick data
            await updateChartData(currentSymbol);
            
            // Fetch market data for info panel
            await fetchMarketData();
            
            // Fetch initial physics and performance data
            await fetchPhysicsState(currentSymbol);
            await fetchPerformanceMetrics();
            updatePhysicsFactorsDisplay();
            updatePerformanceDisplay();
            
            // Auto-refresh chart every 60 seconds (candlesticks don't need frequent updates)
            updateInterval = setInterval(async () => {
                await updateChartData(currentSymbol);
                await fetchMarketData();
            }, 60000);
            
            // Real-time price updates every 5 seconds (updates latest candle)
            // Note: This is controlled by the 'live' layer toggle
            if (controlDeckState.layers.live) {
                realTimeUpdateInterval = setInterval(updateRealTimePrice, 5000);
            }
            
            // Update position markers every 10 seconds
            setInterval(updatePositionMarkers, 10000);
            
            // Update predictions if enabled
            if (controlDeckState.layers.predictions) {
                // Wait a bit for chart to be ready
                setTimeout(async () => {
                    await togglePredictions(true);
                    // Update Control Deck button state
                    const predictionsBtn = document.querySelector('[data-layer="predictions"]');
                    if (predictionsBtn) {
                        predictionsBtn.classList.add('active');
                    }
                }, 1000);
                
                // Auto-refresh predictions every 30 seconds
                setInterval(async () => {
                    if (controlDeckState.layers.predictions) {
                        await togglePredictions(false);
                        await togglePredictions(true);
                    }
                }, 30000);
            }
            
            // Update trades if enabled by default
            if (controlDeckState.layers.trades) {
                setTimeout(async () => {
                    await toggleTradeMarkers(true);
                    const tradesBtn = document.querySelector('[data-layer="trades"]');
                    if (tradesBtn) {
                        tradesBtn.classList.add('active');
                    }
                }, 1000);
            }
            
            log('✅ Trading Chart View initialized');
        }
        
        // Start
        init().catch(error => {
            logError('Initialization failed', error);
        });
    </script>
</body>
