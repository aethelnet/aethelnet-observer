<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Swarm</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA iOS Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <!-- Modern functional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header>
            <div class="brand">
                <h1>SWARM_MVP</h1>
                <span class="badge">v0.1</span>
            </div>
            
            <!-- Resonance Tuner -->
            <div class="tuner-container" style="flex-grow: 1; margin: 0 40px;">
                <input type="text" id="resonance-tuner" placeholder="Tune Stream Resonance (e.g. 'Quantum', 'Images', 'Chaos')..." style="width: 100%; max-width: 400px; padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(6, 182, 212, 0.4); background: rgba(0,0,0,0.4); color: #06b6d4; font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; box-shadow: 0 0 10px rgba(6, 182, 212, 0.1);">
            </div>

            <div class="status-indicator">
                <div id="ws-light" class="indicator-light disconnected"></div>
                <span id="ws-status">Disconnected</span>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main>
            <!-- System Telemetry Panel -->
            <section class="panel">
                <h2>System Telemetry</h2>
                <div class="data-grid" id="telemetry-grid" style="grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));">
                    <div class="data-cell">
                        <span class="label">Nodes</span>
                        <span class="value" id="val-nodes">--</span>
                    </div>
                    <div class="data-cell">
                        <span class="label">Bridges</span>
                        <span class="value" id="val-bridges">--</span>
                    </div>
                    <div class="data-cell">
                        <span class="label">Engine State</span>
                        <span class="value" id="val-state">--</span>
                    </div>
                    <div class="data-cell" style="border-left: 2px solid #eab308; background: rgba(234,179,8,0.02);">
                        <span class="label" style="color: #eab308;">Network Leader</span>
                        <span class="value" id="val-leader" style="font-size: 11px; word-break: break-all; max-height: 40px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="Calculating...">--</span>
                    </div>
                </div>
            </section>

            <!-- Concept Inspector Panel -->
            <section class="panel" id="inspector-panel" style="display: none; border-left: 3px solid #eab308;">
                <h2>Concept Inspector</h2>
                <div class="inspector-content">
                    <h3 id="inspect-title" style="margin: 0 0 10px 0; color: #eab308; font-family: 'JetBrains Mono', monospace; font-size: 14px; word-break: break-all;">Node Title</h3>
                    <div style="display: flex; gap: 20px; margin-bottom: 10px; font-size: 11px;">
                        <span style="color: #888;">Source: <strong id="inspect-source" style="color: #eee;">internal</strong></span>
                        <span style="color: #888;">Confidence: <strong id="inspect-confidence" style="color: #eee;">0.80</strong></span>
                    </div>
                    
                    <div id="media-container" style="margin-top: 15px; margin-bottom: 15px; display: none; text-align: center;">
                        <img id="inspect-image" src="" style="max-width: 100%; border-radius: 8px; border: 1px solid rgba(6, 182, 212, 0.3); display: none;">
                        <audio id="inspect-audio" controls style="width: 100%; margin-top: 10px; display: none; outline: none;"></audio>
                    </div>

                    <div id="inspect-text" class="terminal-log" style="max-height: 180px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 12px; line-height: 1.5; color: #ddd; border: 1px solid rgba(255,255,255,0.05); white-space: pre-wrap; word-break: break-word;">
                        Node description...
                    </div>
                </div>
            </section>

            <!-- Network Canvas Area (For future D3/Canvas map) -->
            <section class="panel map-panel">
                <div class="panel-header">
                    <h2>Manifold Map</h2>
                    <div class="panel-actions" style="display: flex; gap: 15px; align-items: center;">
                        <label style="font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                            <input type="checkbox" id="chk-gossip" checked style="accent-color: #a855f7; cursor: pointer;"> Show Gossip
                        </label>
                        <label style="font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                            <input type="checkbox" id="chk-network" checked style="accent-color: #3b82f6; cursor: pointer;"> Network Nodes
                        </label>
                        <label style="font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                            <input type="checkbox" id="chk-stream" checked style="accent-color: #06b6d4; cursor: pointer;"> Live Streams
                        </label>
                        <button id="btn-reconnect" class="action-btn">Force Sync</button>
                    </div>
                </div>
                <div id="manifold-canvas" class="canvas-container">
                    <div class="canvas-placeholder">Waiting for telemetry...</div>
                </div>
            </section>
            
            <!-- Event Log -->
            <section class="panel log-panel">
                <h2>Event Stream</h2>
                <div id="event-log" class="terminal-log">
                    <!-- Logs injected via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA capabilities
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
