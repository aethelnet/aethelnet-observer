<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Swarm - Sphere UI</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fullscreen Canvas -->
    <div id="manifold-canvas" class="canvas-container"></div>

    <!-- UI Overlay container -->
    <div id="ui-layer">
        
        <!-- Top Left: Aethel Balance (Glowing Core) -->
        <div id="wallet-hud" class="floating-hud">
            <div class="glow-ring"></div>
            <div class="wallet-text">
                <span class="wallet-amount" id="val-aethel">0.0000</span>
                <span class="wallet-symbol">$AETHEL</span>
            </div>
        </div>

        <!-- Top Right: Gear & Toggles -->
        <div id="settings-hud" class="floating-hud settings-panel">
            <div id="settings-toggle" class="sys-btn">[ SYS_CFG ]</div>
            <div id="settings-menu" class="hidden">
                <div class="status-indicator">
                    <div id="ws-light" class="indicator-light disconnected"></div>
                    <span id="ws-status">Disconnected</span>
                </div>
                <hr>
                <label class="bauhaus-toggle"><input type="checkbox" id="chk-gossip" checked> <span class="toggle-text">Show Gossip</span></label>
                <label class="bauhaus-toggle"><input type="checkbox" id="chk-network" checked> <span class="toggle-text">Network Nodes</span></label>
                <label class="bauhaus-toggle"><input type="checkbox" id="chk-stream" checked> <span class="toggle-text">Live Streams</span></label>
                <hr>
                <label class="bauhaus-toggle"><input type="checkbox" id="chk-keystrokes" checked> <span class="toggle-text">Biometrics (Keystrokes)</span></label>
                <hr>
                <button id="btn-reconnect" class="icon-btn" style="width: 100%; border: var(--panel-border);">FORCE_SYNC</button>
            </div>
        </div>

        <!-- Bottom: Tuner Input (Floating) -->
        <div class="tuner-container floating-tuner">
            <div class="tuner-wrapper">
                <button class="icon-btn" id="btn-upload" title="Inject File" onclick="document.getElementById('file-upload').click()">[ + ]</button>
                <input type="file" id="file-upload" style="display: none;">
                <input type="text" id="resonance-tuner" placeholder="Type directly into the void...">
            </div>
        </div>

        <!-- Concept Inspector Panel (Floating) -->
        <section class="panel floating-inspector" id="inspector-panel" style="display: none;">
            <h2>Concept Inspector</h2>
            <div class="inspector-content">
                <h3 id="inspect-title">Node Title</h3>
                <div class="meta-row">
                    <span>Source: <strong id="inspect-source">internal</strong></span>
                    <span>Conf: <strong id="inspect-confidence">0.80</strong></span>
                </div>
                
                <div class="decode-format-selector">
                    <span class="decode-label">DECODE AS:</span>
                    <div class="decode-options">
                        <label class="radio-btn"><input type="radio" name="format" value="auto" checked> AUTO</label>
                        <label class="radio-btn"><input type="radio" name="format" value="text"> TXT</label>
                        <label class="radio-btn"><input type="radio" name="format" value="image"> IMG</label>
                        <label class="radio-btn"><input type="radio" name="format" value="audio"> WAV</label>
                    </div>
                </div>
                
                <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="icon-btn" id="btn-dive" style="flex: 1; border: var(--panel-border);">[ DIVE IN ]</button>
                    <button class="icon-btn" id="btn-zoomout" style="flex: 1; display: none; background: var(--accent-blue); color: #FFF; border: var(--panel-border);">[ ZOOM OUT ]</button>
                    <button class="icon-btn" id="btn-deploy-spider" style="flex: 1; border: var(--panel-border); color: #F2C12E;">[ DEPLOY SPIDER ]</button>
                    <button class="icon-btn" id="btn-fuse" style="flex: 1; border: var(--panel-border); color: #E03C31;">[ FUSE NODES ]</button>
                </div>

                <div id="media-container" style="display: none;">
                    <img id="inspect-image" src="" style="display: none;">
                    <audio id="inspect-audio" controls style="display: none;"></audio>
                </div>

                <div id="inspect-text" class="terminal-log"></div>
            </div>
        </section>

        <!-- Event Log (Floating Bottom Left) -->
        <section class="panel log-panel floating-log">
            <div id="event-log" class="terminal-log"></div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
            });
        }
        
        // Gear Menu Toggle
        document.getElementById('settings-toggle').addEventListener('click', () => {
            document.getElementById('settings-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
