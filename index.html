<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:20px;width:100vw;height:100vh;"><b>ERROR:</b><br>' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:20px;width:100vw;height:100vh;"><b>PROMISE REJECTION:</b><br>' + e.reason + '</div>';
      });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LGNN Hub">
    <title>Auratic Neural Manifold | Sovereign Control</title>
    <!-- Removed CDN links for fonts/icons to prevent ERR_TIMED_OUT on strict networks -->
    <script>
      // WebSocket Setup - using native WebSocket, no external script needed
      window.AUTO_START_WS = window.AUTO_START_WS !== false;
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
